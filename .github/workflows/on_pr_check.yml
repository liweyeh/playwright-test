name: On PR Playwright Tests
on:
  pull_request:
    branches: [ main ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments
      contents: write      # Required if uploading to GH Pages
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      env:
        TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
      run: pnpm exec playwright test --reporter=html,json --grep @snapshot
    - name: Post Report Link to PR
      if: always()
      uses: thollander/actions-comment-pull-request@v2
      with:
        message: |
          ### 🎭 Playwright Test Results
          ✅ **Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          | Status | Total | Passed | Failed | Flaky |
          |-------|-------|--------|--------|-------|
          | See report for details | ${{ github.run_id }} | -- | -- | -- |
    - name: Deploy Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        destination_dir: pr-${{ github.event.number }} # Unique folder per PR
