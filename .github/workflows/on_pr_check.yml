name: On PR Playwright Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: macos-latest # or macos-14
    permissions:
      pull-requests: write # Required to post comments
      contents: write      # Required if uploading to GH Pages
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      env:
        TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
      run: pnpm exec playwright test --reporter=html,json --grep @snapshot
    - name: Post Summary to PR
      uses: daun/playwright-report-summary@v3
      if: always()
      with:
        report-file: results.json
    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        destination_dir: pr-${{ github.event.number }}
        keep_files: true # CRITICAL: Prevents new PRs from deleting old PR reports

    - name: Post Comment to PR
      if: always()
      uses: thollander/actions-comment-pull-request@v2
      with:
        message: |
          ### 🎭 Playwright Test Report
          🚀 View the live report here:
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/
        comment_tag: playwright_report
