name: Update Visual Snapshots
on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
jobs:
  update-snapshots:
    if: github.event.pull_request.merged == true
    timeout-minutes: 60
    runs-on: macos-latest
    permissions:
      contents: write # Required to push changes
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Update Visual Snapshots
        env:
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: pnpm pw-test:update-visual

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code tests/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Updated Snapshots
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tests/
          git commit -m "chore: update visual snapshots [skip ci]"
          git push

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: No Changes Detected
        if: steps.git-check.outputs.changes != 'true'
        run: echo "No snapshot changes detected"
